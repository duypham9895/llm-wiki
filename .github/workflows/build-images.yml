name: build-images

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [app, webui]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push app
        if: matrix.target == 'app'
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          file: ./mcp/deploy/Dockerfile
          push: true
          tags: ghcr.io/duypham9895/llm-wiki/app:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push webui
        if: matrix.target == 'webui'
        uses: docker/build-push-action@v6
        with:
          context: ./mcp/web-ui
          file: ./mcp/web-ui/Dockerfile.build
          push: true
          tags: ghcr.io/duypham9895/llm-wiki/webui:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max